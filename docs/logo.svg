<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <!-- Background pill gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1b4b"/>
      <stop offset="100%" stop-color="#1a2580"/>
    </linearGradient>

    <!-- Cyan glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background pill ─────────────────────────────────────────────────── -->
  <rect x="2" y="2" width="516" height="116" rx="18" ry="18"
        fill="url(#bgGrad)" stroke="#2a3a9f" stroke-width="1.5"/>

  <!-- ── Icon box ─────────────────────────────────────────────────────────── -->
  <rect x="14" y="12" width="96" height="96" rx="14" ry="14"
        fill="#1a1b4b" stroke="#2d3ab0" stroke-width="1"/>

  <!-- Bridge arc -->
  <path d="M 26 80 A 48 38 0 0 1 98 80"
        fill="none" stroke="#00e5ff" stroke-width="4.5"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Three vertical signal lines -->
  <line x1="36" y1="52" x2="36" y2="80" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="62" y1="44" x2="62" y2="80" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="88" y1="52" x2="88" y2="80" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- "J" lettermark lower-right of icon -->
  <text x="74" y="105" font-family="'Segoe UI',Arial,sans-serif" font-weight="900"
        font-size="22" fill="white" opacity="0.9" filter="url(#textShadow)">J</text>

  <!-- ── Wordmark ──────────────────────────────────────────────────────────── -->
  <text x="128" y="62" font-family="'Segoe UI',Arial,sans-serif" font-weight="800"
        font-size="46" letter-spacing="2" fill="white" filter="url(#textShadow)">JDBS</text>

  <!-- Tagline -->
  <text x="130" y="88" font-family="'Segoe UI',Arial,sans-serif" font-weight="400"
        font-size="15" fill="#7ec8e3" letter-spacing="0.5">Java Debug Bridge Server</text>

  <!-- Version badge -->
  <rect x="392" y="76" width="100" height="22" rx="6" ry="6"
        fill="#00e5ff" fill-opacity="0.15" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="442" y="91" font-family="'Segoe UI',Arial,sans-serif" font-size="12"
        fill="#00e5ff" text-anchor="middle" letter-spacing="0.3">v 1.0.0</text>

  <!-- Port badge -->
  <rect x="392" y="46" width="100" height="22" rx="6" ry="6"
        fill="#6fcf97" fill-opacity="0.15" stroke="#6fcf97" stroke-width="1" stroke-opacity="0.5"/>
  <text x="442" y="61" font-family="'Segoe UI',Arial,sans-serif" font-size="12"
        fill="#6fcf97" text-anchor="middle" letter-spacing="0.3">port 6218</text>
</svg>
