<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────────────── -->
  <rect width="860" height="560" fill="#f8f9fc" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700"
        fill="#1a1b4b" letter-spacing="0.5">JDBS – Logical Architecture</text>

  <!-- ══════════════════════════════════════════════════════════════════════════
       CLIENT APPLICATIONS (left column)
  ══════════════════════════════════════════════════════════════════════════════ -->
  <rect x="24" y="55" width="234" height="456" rx="12" fill="#eef3fb"
        stroke="#b0c4e8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="141" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1b4b">
    Your Application(s)
  </text>

  <!-- Log4j2 Appender box -->
  <rect x="42" y="96" width="196" height="72" rx="8" fill="white"
        stroke="#d4a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#b07d00">Log4j2 Appender</text>
  <text x="140" y="134" text-anchor="middle" font-size="10" fill="#555">JdbsLog4j2Appender</text>
  <text x="140" y="149" text-anchor="middle" font-size="10" fill="#888">log4j2.xml config</text>
  <text x="140" y="162" text-anchor="middle" font-size="10" fill="#888">@Plugin annotation</text>

  <!-- Logback / SLF4J Appender box -->
  <rect x="42" y="186" width="196" height="72" rx="8" fill="white"
        stroke="#43a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#1a6b1a">Logback / SLF4J</text>
  <text x="140" y="224" text-anchor="middle" font-size="10" fill="#555">JdbsLogbackAppender</text>
  <text x="140" y="239" text-anchor="middle" font-size="10" fill="#888">logback.xml config</text>
  <text x="140" y="252" text-anchor="middle" font-size="10" fill="#888">JavaBean properties</text>

  <!-- Direct API box -->
  <rect x="42" y="276" width="196" height="72" rx="8" fill="white"
        stroke="#7b43d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="297" text-anchor="middle" font-size="12" font-weight="700" fill="#5a1a9a">Direct API (lite jar)</text>
  <text x="140" y="314" text-anchor="middle" font-size="10" fill="#555">JdbsClient.connect()</text>
  <text x="140" y="329" text-anchor="middle" font-size="10" fill="#888">No framework needed</text>
  <text x="140" y="342" text-anchor="middle" font-size="10" fill="#888">Jackson only</text>

  <!-- Image attachment box -->
  <rect x="42" y="366" width="196" height="72" rx="8" fill="white"
        stroke="#c04060" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#a02040">Image Attachment</text>
  <text x="140" y="404" text-anchor="middle" font-size="10" fill="#555">ThreadLocal attach API</text>
  <text x="140" y="419" text-anchor="middle" font-size="10" fill="#888">PNG / JPG base64</text>
  <text x="140" y="432" text-anchor="middle" font-size="10" fill="#888">embedded in JSON payload</text>

  <!-- ══════════════════════════════════════════════════════════════════════════
       TRANSPORT (middle)
  ══════════════════════════════════════════════════════════════════════════════ -->

  <!-- Arrow: appenders → transport -->
  <line x1="238" y1="200" x2="310" y2="200" stroke="#4a90d9" stroke-width="2"
        marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="238" y1="312" x2="310" y2="312" stroke="#4a90d9" stroke-width="2"
        marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="238" y1="402" x2="310" y2="402" stroke="#4a90d9" stroke-width="2"
        marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- Merge lines into one -->
  <line x1="310" y1="132" x2="310" y2="432" stroke="#4a90d9" stroke-width="2"/>
  <line x1="238" y1="132" x2="310" y2="132" stroke="#4a90d9" stroke-width="2"
        marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- Transport label box -->
  <rect x="312" y="248" width="150" height="80" rx="8" fill="#1a1b4b"
        stroke="#2d3ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="387" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="white">TCP Transport</text>
  <text x="387" y="292" text-anchor="middle" font-size="11" fill="#00e5ff">NDJSON protocol</text>
  <text x="387" y="308" text-anchor="middle" font-size="10" fill="#7ec8e3">1 JSON obj / line</text>
  <text x="387" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#6fcf97">port 6218</text>

  <!-- Arrow: transport → server -->
  <line x1="462" y1="288" x2="530" y2="288" stroke="#4a90d9" stroke-width="2.5"
        marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════════════════════
       JDBS SERVER (right)
  ══════════════════════════════════════════════════════════════════════════════ -->
  <rect x="532" y="55" width="302" height="456" rx="12" fill="#eef3fb"
        stroke="#b0c4e8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="683" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1b4b">
    JDBS Server
  </text>

  <!-- Accept loop box -->
  <rect x="550" y="94" width="264" height="58" rx="8" fill="white"
        stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="682" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4b8a">ServerSocket Accept Loop</text>
  <text x="682" y="135" text-anchor="middle" font-size="10" fill="#555">max-clients enforcement · daemon thread</text>

  <!-- Client handlers box -->
  <rect x="550" y="168" width="264" height="70" rx="8" fill="white"
        stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="682" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4b8a">Client Handlers (thread pool)</text>
  <text x="682" y="207" text-anchor="middle" font-size="10" fill="#555">One thread per client · UUID per connection</text>
  <text x="682" y="222" text-anchor="middle" font-size="10" fill="#555">event counter · forced disconnect support</text>

  <!-- Stats / counters box -->
  <rect x="550" y="254" width="120" height="80" rx="8" fill="white"
        stroke="#e07000" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#b05000">Connection Stats</text>
  <text x="610" y="291" text-anchor="middle" font-size="10" fill="#555">Now (current)</text>
  <text x="610" y="305" text-anchor="middle" font-size="10" fill="#555">Peak (all-time max)</text>
  <text x="610" y="319" text-anchor="middle" font-size="10" fill="#555">Total (cumulative)</text>

  <!-- Log event store box -->
  <rect x="694" y="254" width="120" height="80" rx="8" fill="white"
        stroke="#c04060" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="754" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#a02040">Event Store</text>
  <text x="754" y="291" text-anchor="middle" font-size="10" fill="#555">ObservableList</text>
  <text x="754" y="305" text-anchor="middle" font-size="10" fill="#555">20 000 cap</text>
  <text x="754" y="319" text-anchor="middle" font-size="10" fill="#555">filterable / sortable</text>

  <!-- GUI Mode box -->
  <rect x="550" y="352" width="120" height="100" rx="8" fill="#1a1b4b"
        stroke="#00e5ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="white">GUI Mode</text>
  <text x="610" y="390" text-anchor="middle" font-size="10" fill="#00e5ff">JavaFX 21</text>
  <text x="610" y="406" text-anchor="middle" font-size="10" fill="#7ec8e3">Log table + filter</text>
  <text x="610" y="420" text-anchor="middle" font-size="10" fill="#7ec8e3">Connections tab</text>
  <text x="610" y="436" text-anchor="middle" font-size="10" fill="#7ec8e3">Dark / Light mode</text>
  <text x="610" y="450" text-anchor="middle" font-size="10" fill="#6fcf97">--gui (default)</text>

  <!-- CLI Mode box -->
  <rect x="694" y="352" width="120" height="100" rx="8" fill="#1a1b4b"
        stroke="#6fcf97" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="754" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="white">CLI Mode</text>
  <text x="754" y="390" text-anchor="middle" font-size="10" fill="#6fcf97">Headless / Docker</text>
  <text x="754" y="406" text-anchor="middle" font-size="10" fill="#7ec8e3">ANSI colour output</text>
  <text x="754" y="420" text-anchor="middle" font-size="10" fill="#7ec8e3">Ctrl-C shutdown hook</text>
  <text x="754" y="436" text-anchor="middle" font-size="10" fill="#7ec8e3">logback.xml logging</text>
  <text x="754" y="450" text-anchor="middle" font-size="10" fill="#6fcf97">--cli flag</text>

  <!-- Config/prefs box -->
  <rect x="620" y="466" width="125" height="38" rx="6" fill="white"
        stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="682" y="482" text-anchor="middle" font-size="10" font-weight="700" fill="#444">Persisted Config</text>
  <text x="682" y="496" text-anchor="middle" font-size="10" fill="#666">java.util.prefs.Preferences</text>

  <!-- Internal arrows -->
  <line x1="682" y1="152" x2="682" y2="168" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="682" y1="238" x2="682" y2="254" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="682" y1="238" x2="610" y2="254" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="682" y1="334" x2="610" y2="352" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="682" y1="334" x2="754" y2="352" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="452" x2="660" y2="466" stroke="#888" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGrey)"/>
  <line x1="754" y1="452" x2="706" y2="466" stroke="#888" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGrey)"/>

  <!-- ══════════════════════════════════════════════════════════════════════════
       Legend
  ══════════════════════════════════════════════════════════════════════════════ -->
  <rect x="24" y="520" width="812" height="32" rx="6" fill="#e8edf8" stroke="#c8d0e8" stroke-width="1"/>
  <line x1="44" y1="536" x2="80" y2="536" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="86" y="540" font-size="11" fill="#444">TCP connection / data flow</text>
  <line x1="240" y1="536" x2="276" y2="536" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="282" y="540" font-size="11" fill="#444">Internal dispatch</text>
  <line x1="430" y1="536" x2="466" y2="536" stroke="#888" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGrey)"/>
  <text x="472" y="540" font-size="11" fill="#888">Config read / write</text>
</svg>
